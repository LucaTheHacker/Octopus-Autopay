name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed by the release job

jobs:
  test:
    name: Test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

  build:
    name: Build ${{ matrix.binary.name }} ${{ matrix.platform.goos }}/${{ matrix.platform.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        binary:
          - { dir: .,           name: octopus-autopay }
          - { dir: ./recurring, name: octopus-autopay-recurring }
        platform:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: windows, goarch: '386', ext: .exe }
          - { goos: windows, goarch: arm64, ext: .exe }
    env:
      CGO_ENABLED: '0'
      GOOS:   ${{ matrix.platform.goos }}
      GOARCH: ${{ matrix.platform.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/${{ matrix.binary.name }}-${GOOS}-${GOARCH}${{ matrix.platform.ext }}"
          # -trimpath strips the build host's paths from the binary.
          # -s -w drops symbol/DWARF tables — smaller binary, no debug.
          # The whole project is pure Go (no CGO), so this cross-compiles
          # cleanly from one Linux runner to every target.
          go build -trimpath -ldflags='-s -w' -o "$out" ${{ matrix.binary.dir }}
          ls -la "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary.name }}-${{ matrix.platform.goos }}-${{ matrix.platform.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release (on tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: List artifacts
        run: ls -la artifacts/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
